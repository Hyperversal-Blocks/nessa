openapi: 3.0.3
info:
  title: NESSA qFold Object Schemas
  version: 0.1.0
  description: |
    Component-only OpenAPI v3 schema catalog for the objects currently present in
    the NESSA qFold-PQ Go harness, qFold-EC Python reference implementation, ASC
    Go/Python integration, and gateway demo.

    This file intentionally separates implemented wire/runtime objects from
    product-level envelope names that are not implemented yet. `ProofRequest`,
    `VerifierResponse`, `PrivacyReceipt`, `ContextBinding`, `NonceBinding`,
    `ReplayPolicy`, `RetentionNotice`, `VerifierFacingMetadata`, and
    `RejectedOrInvalidRequestResponse` are empty placeholder schemas.

    Secret witness openings are also intentionally omitted from public schemas:
    Go `Opening` and `ScalarOpening` exist internally, but `Commitment.Open` and
    `ScalarCommitment.Open` are tagged `json:"-"` and are not verifier-facing
    wire fields.
servers: []
paths: {}

