x-verification-summary:
  verified_at: '2026-06-02'
  result: source_cross_checked
  notes:
    - qfold-pq Go public JSON structs are represented by their json tags; private witness openings are omitted because they are tagged json:"-".
    - qFold-EC Python dataclasses and wire helper payloads are represented as JSON-compatible hex projections for byte fields.
    - Product-level request, response, receipt, context, nonce, replay, retention, and verifier metadata envelopes were not found as concrete implementation objects and remain empty placeholders.
    - EC non-linear proof fields are documented as an implemented Python object but not as a normative EC v1 production claim.
    - ASC denied bundles can omit folded_object and proof; allowed bundles bind request.context_digest to folded_object.proof_context_label.

x-validation-rules:
  request_structure:
    - Product-level ProofRequest is a placeholder until implemented; concrete ASC bundles currently use request.context_digest plus folded_object.proof_context_label.
    - Reject unknown or malformed concrete proof-engine fields at the verifier boundary.
  request_hash:
    - Product-level canonical request hash is not implemented as a dedicated object yet.
    - Implemented context binding uses qfold-pq ProofContext, ASC context_digest, proof_context_label, transcript roots, policy hashes, and compiler hashes.
  verifier_signature:
    - qfold-pq VerifierCredential uses verifier_id, action_id, policy_hash, epoch, expires_at, audience, and sig.
    - Production signatures are not implemented in qfold-pq v3; the harness uses an HMAC-style test credential.
  expiry:
    - qfold-pq verifier rejects when now is greater than ProofContext.expires_at.
    - Gateway freshness is enforced by server nonce, rate window, and usage budget in the Python gateway demo.
  nonce:
    - GatewayVerifier issues a nonce and rejects nonce mismatch or previously used nonce.
    - qfold-pq uses context nullifier_hash for verifier-side replay checks.
  context_binding:
    - qfold-pq verifier requires the provided expected ProofContext to exactly match the bundle context.
    - ASC verifier recomputes campaign-bound context_digest and checks both request.context_digest and folded_object.proof_context_label.
  disclosure_limits:
    - ASC selective disclosure exposes only requested dotted fields.
    - ASC redactors strip prover_identity, raw_profile, user_secret_digest, material previews, and denied-case detail where applicable.
  response_binding:
    - Implemented responses are AdVerificationReceipt and VerifierReceipt, not a product VerifierResponse object.
    - qfold-pq LinearBundle and NonlinearBundle bind proof profile, policy hash, compiler hash, verifier credential, issuer registry, nullifier, expiry, and transcript roots.
  replay_status:
    - Reuse of a consumed nullifier in qfold-pq is rejected.
    - Reuse of an already seen gateway nonce is rejected as replay_detected.
  privacy_receipt_consistency:
    - Product PrivacyReceipt is not implemented as a dedicated schema.
    - Implemented receipt consistency is represented by AdVerificationReceipt fields and gateway VerifierReceipt fields.

x-replay-nullifier-model:
  accepted_cases:
    - A fresh gateway nonce is presented once with an otherwise valid proof bundle.
    - A qfold-pq context contains a nullifier_hash not present in the verifier used-nullifier set.
    - A reusable verifier request is accepted only if the application intentionally scopes each response to a fresh nonce or distinct nullifier.
  rejected_cases:
    - Gateway expected_nonce does not match wire_bundle.gateway_meta.server_nonce.
    - Gateway expected_nonce was already recorded in the verifier nonce set.
    - qfold-pq used map already contains ProofContext.nullifier_hash.
    - ASC verifier sees a duplicate nullifier for the campaign.

components:
  schemas:
    HexString:
      type: string
      pattern: '^[0-9a-fA-F]+$'
      description: Hex-encoded byte string.
    Hex32:
      type: string
      pattern: '^[0-9a-fA-F]{64}$'
      description: 32-byte value encoded as 64 hex characters.
    Hex64:
      type: string
      pattern: '^[0-9a-fA-F]{128}$'
      description: 64-byte value encoded as 128 hex characters.
    HashHex:
      allOf:
        - $ref: '#/components/schemas/HexString'
      description: Hash value encoded as lowercase hex in current generated objects.
    Int64:
      type: integer
      format: int64
    Vec:
      type: array
      description: qfold-pq vector over the harness modulus.
      items:
        $ref: '#/components/schemas/Int64'
    Mat:
      type: array
      description: qfold-pq matrix represented as row vectors.
      items:
        $ref: '#/components/schemas/Vec'
    ECPointHex:
      allOf:
        - $ref: '#/components/schemas/Hex32'
      description: Ristretto255 point encoded as 32 bytes and serialized as hex in Python wire helpers.
    ECScalarHex:
      allOf:
        - $ref: '#/components/schemas/Hex32'
      description: Ristretto255 scalar encoded as 32 bytes and serialized as hex in Python wire helpers.
    OptionalHex64:
      type: string
      pattern: '^$|^[0-9a-fA-F]{128}$'
      description: Empty string or 64-byte SHA-512 digest encoded as 128 hex characters.

    ProofRequest:
      type: object
      additionalProperties: true
      description: Empty placeholder. No concrete product-level ProofRequest object is implemented in qfold-pq or the qFold Python reference yet.
    VerifierResponse:
      type: object
      additionalProperties: true
      description: Empty placeholder. Concrete implemented verifier outputs are AdVerificationReceipt and VerifierReceipt.
    PrivacyReceipt:
      type: object
      additionalProperties: true
      description: Empty placeholder. A dedicated privacy receipt object is not implemented yet.
    ContextBinding:
      type: object
      additionalProperties: true
      description: Empty placeholder. Implemented context binding is currently ProofContext, ASCProofRequestContext, proof_context_label, and gateway nonce metadata.
    NonceBinding:
      type: object
      additionalProperties: true
      description: Empty placeholder. Gateway nonce behavior exists, but not as a standalone schema object.
    ReplayPolicy:
      type: object
      additionalProperties: true
      description: Empty placeholder. Replay behavior is implemented through used nonce/nullifier sets, not a standalone policy object.
    RetentionNotice:
      type: object
      additionalProperties: true
      description: Empty placeholder. No retention notice object exists in the inspected implementation.
    VerifierFacingMetadata:
      type: object
      additionalProperties: true
      description: Empty placeholder. Concrete verifier-facing metadata appears in ASCMeta and receipt objects.
    RejectedOrInvalidRequestResponse:
      type: object
      additionalProperties: true
      description: Empty placeholder for the product-level rejected/invalid request response. Concrete errors are APIError or denied ASC bundles.

    Params:
      type: object
      description: qfold-pq deterministic parameter set derived from the proof context.
      required: [suite, q, k, d, n_rho, A, G, Hpol]
      additionalProperties: false
      properties:
        suite:
          type: string
          enum: [NESSA-PQ-QFOLD-STATE-FIXED-FLOW-GO-v3]
        q:
          $ref: '#/components/schemas/Int64'
        k:
          type: integer
        d:
          type: integer
        n_rho:
          type: integer
        A:
          $ref: '#/components/schemas/Mat'
        G:
          $ref: '#/components/schemas/Mat'
        Hpol:
          $ref: '#/components/schemas/Vec'

    Commitment:
      type: object
      description: Public qfold-pq row commitment. The internal opening is intentionally not serialized.
      required: [C]
      additionalProperties: false
      properties:
        C:
          $ref: '#/components/schemas/Vec'

    ScalarCommitment:
      type: object
      description: Public qfold-pq scalar commitment. The internal scalar opening is intentionally not serialized.
      required: [V]
      additionalProperties: false
      properties:
        V:
          $ref: '#/components/schemas/Vec'

    LinearRelProof:
      type: object
      description: qfold-pq masked bounded proof of a linear relation Y = M*x mod Q.
      required: [T, c, z, bound]
      additionalProperties: false
      properties:
        T:
          $ref: '#/components/schemas/Vec'
        c:
          $ref: '#/components/schemas/Int64'
        z:
          $ref: '#/components/schemas/Vec'
        bound:
          $ref: '#/components/schemas/Int64'

    LinkProof:
      type: object
      description: qfold-pq link proof that C_star and scalar commitments open to one shared folded witness.
      required: [rel]
      additionalProperties: false
      properties:
        rel:
          $ref: '#/components/schemas/LinearRelProof'

    ProductProof:
      type: object
      description: qfold-pq committed-scalar multiplication proof for X * Y = Z.
      required: [T_a, T_b, T_0, T_cross, c, z_a, z_b, z_o, proof_a, proof_b, proof_o]
      additionalProperties: false
      properties:
        T_a:
          $ref: '#/components/schemas/Vec'
        T_b:
          $ref: '#/components/schemas/Vec'
        T_0:
          $ref: '#/components/schemas/Vec'
        T_cross:
          $ref: '#/components/schemas/Vec'
        c:
          $ref: '#/components/schemas/Int64'
        z_a:
          $ref: '#/components/schemas/Int64'
        z_b:
          $ref: '#/components/schemas/Int64'
        z_o:
          $ref: '#/components/schemas/Int64'
        proof_a:
          $ref: '#/components/schemas/LinearRelProof'
        proof_b:
          $ref: '#/components/schemas/LinearRelProof'
        proof_o:
          $ref: '#/components/schemas/LinearRelProof'

    VerifierCredential:
      type: object
      description: qfold-pq verifier-issued credential binding verifier identity, action, policy, epoch, expiry, and audience.
      required: [verifier_id, action_id, policy_hash, epoch, expires_at, audience, sig]
      additionalProperties: false
      properties:
        verifier_id:
          type: string
        action_id:
          type: string
        policy_hash:
          type: string
        epoch:
          $ref: '#/components/schemas/Int64'
        expires_at:
          $ref: '#/components/schemas/Int64'
        audience:
          type: string
        sig:
          type: string

    ProofContext:
      type: object
      description: qfold-pq transcript and verifier context. The verifier requires exact context equality and recomputes parameters from this object.
      required:
        - verifier_id
        - action_id
        - policy_hash
        - compiler_hash
        - epoch
        - nullifier_hash
        - issuer_registry_hash
        - verifier_credential_hash
        - proof_profile
        - expires_at
      additionalProperties: false
      properties:
        verifier_id:
          type: string
        action_id:
          type: string
        policy_hash:
          type: string
        compiler_hash:
          type: string
        epoch:
          $ref: '#/components/schemas/Int64'
        nullifier_hash:
          type: string
        issuer_registry_hash:
          type: string
        verifier_credential_hash:
          type: string
        proof_profile:
          type: string
          enum: [NESSA-PQ-QFOLD-STATE-FIXED-FLOW-GO-v3]
        expires_at:
          $ref: '#/components/schemas/Int64'

    Attestation:
      type: object
      description: qfold-pq issuer attestation over a row commitment and policy provenance.
      required: [issuer_id, subject, schema_hash, commitment_hash, policy_hash, epoch, sig]
      additionalProperties: false
      properties:
        issuer_id:
          type: string
        subject:
          type: string
        schema_hash:
          type: string
        commitment_hash:
          type: string
        policy_hash:
          type: string
        epoch:
          $ref: '#/components/schemas/Int64'
        sig:
          type: string

    LinearBundle:
      type: object
      description: qfold-pq linear proof bundle with commitments, context, row proofs, folded commitment, and folded policy proof.
      required:
        - params
        - context
        - verifier_credential
        - schema_hash
        - commitments
        - attestations
        - C_star
        - V
        - row_v
        - row_links
        - row_policy_proofs
        - A
        - b
        - root
        - alphas
        - s
        - link
        - policy_proof
      additionalProperties: false
      properties:
        params:
          $ref: '#/components/schemas/Params'
        context:
          $ref: '#/components/schemas/ProofContext'
        verifier_credential:
          $ref: '#/components/schemas/VerifierCredential'
        schema_hash:
          type: string
        commitments:
          type: array
          items:
            $ref: '#/components/schemas/Vec'
        attestations:
          type: array
          items:
            $ref: '#/components/schemas/Attestation'
        C_star:
          $ref: '#/components/schemas/Vec'
        V:
          type: array
          items:
            $ref: '#/components/schemas/Vec'
        row_v:
          type: array
          items:
            type: array
            items:
              $ref: '#/components/schemas/Vec'
        row_links:
          type: array
          items:
            $ref: '#/components/schemas/LinkProof'
        row_policy_proofs:
          type: array
          items:
            $ref: '#/components/schemas/LinearRelProof'
        A:
          $ref: '#/components/schemas/Mat'
        b:
          $ref: '#/components/schemas/Vec'
        root:
          type: string
        alphas:
          $ref: '#/components/schemas/Vec'
        s:
          $ref: '#/components/schemas/Int64'
        link:
          $ref: '#/components/schemas/LinkProof'
        policy_proof:
          $ref: '#/components/schemas/LinearRelProof'

    NonlinearRowV:
      type: array
      description: Three scalar commitment vectors for L, R, and O in the qfold-pq multiplication-gate profile.
      minItems: 3
      maxItems: 3
      items:
        $ref: '#/components/schemas/Vec'

    NonlinearBundle:
      type: object
      description: qfold-pq non-linear multiplication-gate state proof bundle.
      required:
        - params
        - context
        - verifier_credential
        - schema_hash
        - commitments
        - attestations
        - root
        - alphas
        - row_v
        - row_links
        - row_mul
        - VL_acc
        - VR_acc
        - VO_acc
        - CE_acc
        - cross1
        - cross2
        - VT1
        - VT2
        - final_mul
      additionalProperties: false
      properties:
        params:
          $ref: '#/components/schemas/Params'
        context:
          $ref: '#/components/schemas/ProofContext'
        verifier_credential:
          $ref: '#/components/schemas/VerifierCredential'
        schema_hash:
          type: string
        commitments:
          type: array
          items:
            $ref: '#/components/schemas/Vec'
        attestations:
          type: array
          items:
            $ref: '#/components/schemas/Attestation'
        root:
          type: string
        alphas:
          $ref: '#/components/schemas/Vec'
        row_v:
          type: array
          items:
            $ref: '#/components/schemas/NonlinearRowV'
        row_links:
          type: array
          items:
            $ref: '#/components/schemas/LinkProof'
        row_mul:
          type: array
          items:
            $ref: '#/components/schemas/ProductProof'
        VL_acc:
          type: array
          items:
            $ref: '#/components/schemas/Vec'
        VR_acc:
          type: array
          items:
            $ref: '#/components/schemas/Vec'
        VO_acc:
          type: array
          items:
            $ref: '#/components/schemas/Vec'
        CE_acc:
          type: array
          items:
            $ref: '#/components/schemas/Vec'
        cross1:
          type: array
          items:
            $ref: '#/components/schemas/ProductProof'
        cross2:
          type: array
          items:
            $ref: '#/components/schemas/ProductProof'
        VT1:
          type: array
          items:
            $ref: '#/components/schemas/Vec'
        VT2:
          type: array
          items:
            $ref: '#/components/schemas/Vec'
        final_mul:
          $ref: '#/components/schemas/ProductProof'

    EventEC:
      type: object
      description: qFold-EC Event dataclass containing one execution event before scalar-field encoding.
      required: [values]
      additionalProperties: false
      properties:
        values:
          type: array
          items:
            type: integer

    TranscriptStateEC:
      type: object
      description: qFold-EC transcript state with canonical tags hash, transcript roots, and alpha challenges.
      required: [tags, tags_hash, roots, alphas]
      additionalProperties: false
      properties:
        tags:
          type: object
          additionalProperties: true
        tags_hash:
          $ref: '#/components/schemas/Hex64'
        roots:
          type: array
          items:
            $ref: '#/components/schemas/Hex64'
        alphas:
          type: array
          items:
            $ref: '#/components/schemas/ECScalarHex'

    ProofLinkEC:
      type: object
      description: qFold-EC pi_link proof serialized by Python wire helpers.
      required: [T_commit, T_policy, z_m, z_rho, z_gamma, challenge]
      additionalProperties: false
      properties:
        T_commit:
          $ref: '#/components/schemas/ECPointHex'
        T_policy:
          type: array
          items:
            $ref: '#/components/schemas/ECPointHex'
        z_m:
          type: array
          items:
            $ref: '#/components/schemas/ECScalarHex'
        z_rho:
          type: array
          items:
            $ref: '#/components/schemas/ECScalarHex'
        z_gamma:
          type: array
          items:
            $ref: '#/components/schemas/ECScalarHex'
        challenge:
          $ref: '#/components/schemas/ECScalarHex'

    ProofConsLinearEC:
      type: object
      description: qFold-EC linear constraint proof serialized by Python wire helpers.
      required: [T, z, challenge]
      additionalProperties: false
      properties:
        T:
          $ref: '#/components/schemas/ECPointHex'
        z:
          $ref: '#/components/schemas/ECScalarHex'
        challenge:
          $ref: '#/components/schemas/ECScalarHex'

    ProofConsNonlinearEC:
      type: object
      description: qFold-EC non-linear folded multiplication proof object. EC v1 treats this as demonstrative unless a full circuit proof profile is selected.
      required:
        - C_E
        - T_L
        - T_R
        - T_O
        - T_E
        - T_mul_base
        - T_mul_cross
        - z_L
        - z_R
        - z_O
        - z_E
        - z_gamma_L
        - z_gamma_R
        - z_gamma_O
        - z_rE
        - z_mul_blind
        - challenge
      additionalProperties: false
      properties:
        C_E:
          $ref: '#/components/schemas/ECPointHex'
        T_L:
          $ref: '#/components/schemas/ECPointHex'
        T_R:
          $ref: '#/components/schemas/ECPointHex'
        T_O:
          $ref: '#/components/schemas/ECPointHex'
        T_E:
          $ref: '#/components/schemas/ECPointHex'
        T_mul_base:
          $ref: '#/components/schemas/ECPointHex'
        T_mul_cross:
          $ref: '#/components/schemas/ECPointHex'
        z_L:
          $ref: '#/components/schemas/ECScalarHex'
        z_R:
          $ref: '#/components/schemas/ECScalarHex'
        z_O:
          $ref: '#/components/schemas/ECScalarHex'
        z_E:
          $ref: '#/components/schemas/ECScalarHex'
        z_gamma_L:
          $ref: '#/components/schemas/ECScalarHex'
        z_gamma_R:
          $ref: '#/components/schemas/ECScalarHex'
        z_gamma_O:
          $ref: '#/components/schemas/ECScalarHex'
        z_rE:
          $ref: '#/components/schemas/ECScalarHex'
        z_mul_blind:
          $ref: '#/components/schemas/ECScalarHex'
        challenge:
          $ref: '#/components/schemas/ECScalarHex'

    NessaProofEC:
      type: object
      description: Complete qFold-EC proof object as represented by the Python NessaProof dataclass.
      required: [C_star, V_list, pi_link, N, d]
      additionalProperties: false
      properties:
        C_star:
          $ref: '#/components/schemas/ECPointHex'
        V_list:
          type: array
          items:
            $ref: '#/components/schemas/ECPointHex'
        pi_link:
          $ref: '#/components/schemas/ProofLinkEC'
        pi_cons_linear:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ProofConsLinearEC'
        pi_cons_nonlinear:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ProofConsNonlinearEC'
        N:
          type: integer
        d:
          type: integer

    BenchmarkResult:
      type: object
      description: qFold-EC benchmark and verification result metrics.
      required:
        - N
        - d
        - gen_derive_ms
        - commit_ms
        - transcript_ms
        - fold_ms
        - nonlinear_fold_ms
        - prove_link_ms
        - prove_cons_ms
        - verify_link_ms
        - verify_cons_ms
        - total_prove_ms
        - total_verify_ms
        - proof_size_bytes
        - folding_check_ok
        - link_verify_ok
        - cons_verify_ok
      additionalProperties: false
      properties:
        N:
          type: integer
        d:
          type: integer
        gen_derive_ms:
          type: number
        commit_ms:
          type: number
        transcript_ms:
          type: number
        fold_ms:
          type: number
        nonlinear_fold_ms:
          type: number
        prove_link_ms:
          type: number
        prove_cons_ms:
          type: number
        verify_link_ms:
          type: number
        verify_cons_ms:
          type: number
        total_prove_ms:
          type: number
        total_verify_ms:
          type: number
        proof_size_bytes:
          type: integer
        folding_check_ok:
          type: boolean
        link_verify_ok:
          type: boolean
        cons_verify_ok:
          type: boolean

    ProtocolFlowEC:
      type: object
      description: JSON-compatible projection of the qFold-EC ProtocolFlow dataclass. Public wire exports are FlowFoldedObject and FlowProofPayload.
      additionalProperties: false
      properties:
        result:
          $ref: '#/components/schemas/BenchmarkResult'
        gens:
          type: object
          additionalProperties: true
        events:
          type: array
          items:
            type: array
            items:
              type: integer
        commitments:
          type: array
          items:
            $ref: '#/components/schemas/ECPointHex'
        tags:
          type: object
          additionalProperties: true
        tags_hash:
          $ref: '#/components/schemas/Hex64'
        policy_compiled:
          $ref: '#/components/schemas/HexString'
        transcript_roots:
          type: array
          items:
            $ref: '#/components/schemas/Hex64'
        alphas:
          type: array
          items:
            $ref: '#/components/schemas/ECScalarHex'
        fold_weights:
          type: array
          items:
            $ref: '#/components/schemas/ECScalarHex'
        C_star:
          $ref: '#/components/schemas/ECPointHex'
        m_star:
          type: array
          items:
            $ref: '#/components/schemas/ECScalarHex'
        rho_star:
          type: array
          items:
            $ref: '#/components/schemas/ECScalarHex'
        V_list:
          type: array
          items:
            $ref: '#/components/schemas/ECPointHex'
        transcript_context:
          $ref: '#/components/schemas/Hex64'
        proof:
